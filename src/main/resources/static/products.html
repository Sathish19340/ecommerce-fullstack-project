<!DOCTYPE html>
<html>
<head>
<title>Products</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" 
rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
    
    <a class="navbar-brand" href="#">
    E-Commerce Store
    </a>
    
    <div>
    <a href="cart.html" class="btn btn-warning me-2">Cart</a>
    <a href="orders.html" class="btn btn-warning me-2">Orders</a>
    <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>
    </div>
    </nav>
    <div class="container mt-4">
    <h2 class="text-center mb-4">Products</h2>
    <input type="text" id="search" class="form-control mb-3"
    placeholder="Search Products..." onkeyup="searchProducts()">
    <div class="row" id="products"></div>
    </div>
	
	<script>
	fetch("http://localhost:8080/products")
	.then(response=>response.json())
	.then(data=>{
		let output="";
		data.forEach(product=>{
			
			output+=`
			<div class="col-md-4 mb-4">
			<div class="card shadow h-100">
			<img src="${product.imageUrl}" 
			class="card-img-top"
			style="height:200px;object-fit:cover;"
			>
			<div class="card-body">
			<h5 class="card-title">${product.name}</h5>
			<p class="card-text">Price:${product.price}</p>
			<p class="card-text">Stock:${product.quantity}</p>
			
			<button 
			class="btn btn-primary"
			onclick='addToCart(${JSON.stringify(product)})'>
			Add To Cart
			</button>
			</div>
			</div>
			</div>
			`;
		});
		
		document.getElementById("products").innerHTML=output;
	});
	
	
	
	function addToCart(product){
	    const cart={
	        userId: localStorage.getItem("userId"),
	        productId: product.id,
	        productName:product.name,
	        price:product.price,
	        quantity: 1
	    };

	    fetch("http://localhost:8080/cart",{
	        method:"POST",
	        headers:{
	            "Content-Type":"application/json"
	        },
	        body:JSON.stringify(cart)
	    })
	    .then(response=>response.json())
	    .then(data=>{
	        alert("Added To Cart");
	    })
	    .catch(error=>console.log(error));
	}
	
	function searchProducts(){
		let input=document.getElementById("search").value.toLowerCase();
		let cards=document.querySelectorAll(".card");
		cards.forEach(card=>{
			let title=card.querySelector(".card-title").innerText.toLowerCase();
			if(title.includes(input)){
				card.parentElement.style.display="block";
			}else{
				card.parentElement.style.display="none";
			}
		});
	}
	
	function logout(){
		localStorage.clear();
		window.location.href="login.html";
	}
	</script>
</body>
</html>
