<!DOCTYPE html>
<html>
<head>
<title>User Registration</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" 
rel="stylesheet">
</head>
<body class="bg-light">
     
     <div class="container mt-5">
     
     <div class="card mx-auto shadow p-4" style="max-width:500px;">
     
     <h2 class="text-center mb-4">User Registration</h2>
	<input type="text" id="name" class="form-control mb-3" placeholder="Name"><br><br>
	<input type="email" id="email" class="form-control mb-3" placeholder="Email"><br><br>
	<input type="password" id="password" class="form-control mb-3" placeholder="Password"><br><br>
	<button onclick="register()" class="btn btn-success w-100">Register</button>
	<hr>
	<p class="text-center">Already have an account?<a href="login.html">Login</a></p>
     </div>
     
     </div>
	
	
	<script>
	
	function register(){
		const user={
				name:document.getElementById("name").value,
				email:document.getElementById("email").value,
				password:document.getElementById("password").value,
				role:"USER"
		};
		
		fetch("http://localhost:8080/users/register",{
			method:"POST",
			headers:{
				"Content-Type":"application/json"
			},
			body:JSON.stringify(user)
		})
		.then(response=>response.json())
		.then(data=>{
			alert("Registration Successfull");
			window.location.href="login.html";
		})
		.catch(error=>console.log(error));
		
	}
	
	</script>
</body>
</html>
